<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub | My Real Room</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cherry-blossom font-rounded">

    <div id="nyash-world">
        <div class="room-box">
            <div class="wall-left"></div>
            <div class="wall-right"></div>
            <div class="floor"></div>
            <div class="window"></div>

            <div id="room-items">
                <div class="pet-anchor" onclick="NyashPet.tap()">
                    <div id="pet-cloud" class="speech-cloud hidden">Ня! +1🍬</div>
                    <div class="pet-body">🤖</div>
                    <div class="shadow"></div>
                </div>

                <div id="item-wardrobe" class="item hidden" onclick="UI.open('settings')">👗<span>Шкаф</span></div>
                <div id="item-desk" class="item hidden" onclick="UI.open('diary')">📔<span>Стол</span></div>
                <div id="item-oracle" class="item hidden" onclick="UI.open('oracle')">🔮<span>Оракул</span></div>
            </div>
        </div>

        <header class="hub-hud glass-ui">
            <div class="coins">🍬 <span id="candy-balance">0</span></div>
            <button class="shop-btn" onclick="UI.open('shop')">🛒 Магазин</button>
        </header>

        <div id="modal-overlay" class="hidden" onclick="UI.closeOuter(event)">
            <div class="modal-window glass-heavy">
                <div id="modal-body"></div>
                <button class="close-nyash" onclick="UI.close()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
