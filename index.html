<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffeaef">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #ffeaef; transition: background 0.3s; }

        #app { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

        .room-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; transition: 0.5s; }
        .wall { width: 100%; height: 60%; background: #ffc2d1; transition: background 0.3s, box-shadow 0.3s; }
        .floor { width: 100%; height: 40%; background: #fb6f92; border-top: 4px solid rgba(0,0,0,0.05); transition: background 0.3s, border-color 0.3s; }

        #room-title { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 15; font-size: 24px; font-weight: bold; color: #ff6b8b; text-shadow: 0 2px 4px rgba(255,255,255,0.8); background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 20; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border: none; border-radius: 50%; font-size: 30px; color: #ff6b8b; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #nav-left { left: 10px; }
        #nav-right { right: 10px; }

        #hud { position: absolute; top: 30px; left: 20px; right: 20px; z-index: 20; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .badge { pointer-events: auto; background: white; padding: 12px 20px; border-radius: 20px; font-weight: bold; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: #ff6b8b; display: flex; gap: 15px; }
        .btn-group { display: flex; gap: 10px; pointer-events: auto; }
        .btn { width: 55px; height: 55px; background: white; border: none; border-radius: 50%; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .btn:active { transform: scale(0.9); }

        #pet-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 10; cursor: pointer; text-align: center; }
        .pet-wrapper { position: relative; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        #pet { font-size: 130px; user-select: none; transition: filter 0.1s; }
        #pet-clothes { position: absolute; left: 50%; transform: translateX(-50%); font-size: 75px; z-index: 3; pointer-events: none; text-align: center; width: 100px; transition: 0.2s; }
        #pet-container:active .pet-wrapper { transform: scale(0.9); }

        #furniture-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .placed-item { position: absolute; pointer-events: auto; text-align: center; font-size: 55px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); cursor: pointer; transition: transform 0.1s, filter 0.1s; }
        .placed-item:active { transform: scale(0.9); }
        .placed-item span { display: block; font-size: 10px; background: white; color: #ff6b8b; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-top: -5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 35px; padding: 25px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #ff6b8b; z-index: 2; position: relative; }
        .close-btn { background: #fff0f3; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; color: #ff8fa3; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; z-index: 2; position: relative; }
        .card { background: #f8f9fa; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 3px solid transparent; font-weight: bold; color: #333; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .card.active { border-color: #ff8fa3; background: #fff0f3; }

        .phone-bg { background: #1e272e !important; color: white; border: 10px solid #333; border-radius: 40px; padding: 30px 15px; height: 500px;}
        .phone-header { color: white !important; font-size: 18px; margin-bottom: 30px; text-align: center; }
        .app-icon { background: #f1f2f6; border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.1s; color: #333; }
        .app-icon:active { transform: scale(0.9); }
        .app-icon span { font-size: 40px; display: block; margin-bottom: 5px; }

        .mg-btn { padding: 10px 20px; border: none; border-radius: 15px; background: #ff8fa3; color: white; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #dog-area { font-size: 120px; text-align: center; user-select: none; touch-action: none; cursor: grab; padding: 20px; margin: 20px auto; display: inline-block; position: relative; }
        .floating-heart { position: absolute; font-size: 20px; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 50; }
        #pet-progress-bg { width: 100%; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #pet-progress-fill { width: 0%; height: 100%; background: #ff4757; transition: width 0.1s; }

        #hammock-game-area { position: relative; width: 100%; height: 250px; background: #87CEEB; border-radius: 20px; overflow: hidden; touch-action: none; border: 3px solid #4eb8dd; }
        #hammock-player { position: absolute; bottom: 10px; left: 50%; width: 60px; height: 40px; font-size: 40px; transform: translateX(-50%); text-align: center; line-height: 40px; }
        .falling-item { position: absolute; font-size: 25px; top: -30px; }
        
        /* Исправленный класс для бассейна */
        .pool-spot { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border: 4px dashed white; border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 24px; color: transparent; }
        .pool-spot:hover { background: rgba(255,255,255,0.7); transform: translate(-50%, -50%) scale(1.1); color: white; }
        
        .chat-msg { background: #f1f2f6; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; width: 85%; font-size: 14px; position: relative; color: #333; }
        .chat-msg.bot { background: #fff0f3; border: 1px solid #ffc2d1; }
        .chat-reward { display: inline-block; background: #ffeb3b; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-action { display: inline-block; background: #4bcffa; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; color: white; }

        .delivery-box { position: absolute; font-size: 60px; z-index: 6; cursor: pointer; animation: float 2s infinite ease-in-out; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); bottom: 30%; left: 20%; pointer-events: auto;}

        #excursion-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20; padding: 15px 30px; font-size: 20px; font-weight: bold; background: #ff4757; color: white; border: none; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: none; cursor: pointer;}
        #excursion-interaction { position: absolute; top: 40%; left: 50%; transform: translateX(-50%); font-size: 80px; z-index: 10; cursor: pointer; animation: float 2s infinite ease-in-out; display: none; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
        #excursion-interaction:active { transform: translateX(-50%) scale(0.9); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        @keyframes drive { 0% { left: -100px; } 100% { left: 100%; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div class="room-bg">
            <div class="wall"></div>
            <div class="floor"></div>
        </div>

        <button id="nav-left" class="nav-btn" onclick="game.changeRoom(-1)">‹</button>
        <div id="room-title">🛏️ Спальня</div>
        <button id="nav-right" class="nav-btn" onclick="game.changeRoom(1)">›</button>

        <div id="furniture-layer"></div>
        <div id="delivery-layer"></div>

        <div id="excursion-interaction" onclick="game.startExcursionMG()"></div>

        <div id="pet-container" onclick="game.clickPet()">
            <div class="pet-wrapper">
                <div id="pet-clothes"></div>
                <div id="pet">🤖</div>
            </div>
        </div>

        <button id="excursion-btn" onclick="game.goHome()">Домой 🚕</button>

        <div id="hud">
            <div class="badge">
                <span>🍬 <span id="candy-count">0</span></span>
                <span>⚡ <span id="energy-count">100</span></span>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="game.openSettings()">⚙️</button>
                <button class="btn" onclick="game.openShop()">🛒</button>
                <button class="btn" onclick="game.openPets()">🐾</button>
            </div>
        </div>

        <div id="modal" class="hidden" onclick="game.closeBg(event)">
            <div class="modal-content" id="modal-container">
                <div class="modal-header" id="modal-header">
                    <h2 id="modal-title">Меню</h2>
                    <button class="close-btn" id="modal-close-btn" onclick="game.close()">×</button>
                </div>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script>
        function safeLoad(key, fallback) {
            try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : fallback; } 
            catch (e) { return fallback; }
        }

        const game = {
            candies: parseInt(localStorage.getItem('nhub_candies')) || 0,
            energy: localStorage.getItem('nhub_energy') !== null ? parseInt(localStorage.getItem('nhub_energy')) : 100,
            maxEnergy: 100,
            
            pet: localStorage.getItem('nhub_pet') || '🤖',
            inventory: safeLoad('nhub_inv', []),
            theme: localStorage.getItem('nhub_theme') || 'theme-pink',
            
            foods: safeLoad('nhub_foods', { apple: 0, drink: 0, cake: 0, pie: 0, burger: 0, pizza: 0 }),
            gardenState: parseInt(localStorage.getItem('nhub_garden')) || 0,
            
            unlockedClothes: safeLoad('nhub_clothes', []),
            currentCloth: localStorage.getItem('nhub_cloth') || '',
            clothesData: {
                'bow': { emoji: '🎀', name: 'Бантик', price: 10, offset: '-5%' },
                'cap': { emoji: '🧢', name: 'Кепка', price: 20, offset: '-15%' },
                'glasses': { emoji: '🕶️', name: 'Очки', price: 30, offset: '25%' },
                'crown': { emoji: '👑', name: 'Корона', price: 100, offset: '-25%' },
                'mask': { emoji: '🎭', name: 'Маска', price: 50, offset: '20%' },
                'astro': { emoji: '👨‍🚀', name: 'Космос', price: 200, offset: '-10%', premium: true },
                'hero': { emoji: '🦸', name: 'Герой', price: 150, offset: '-10%', premium: true }
            },

            diary: safeLoad('nhub_diary', {}),
            currentDiaryDate: new Date().toLocaleDateString('ru-RU'),
            plantLevel: parseInt(localStorage.getItem('nhub_plant')) || 0,
            
            clickPower: 1,
            partyActive: false,
            
            rooms: ['yard', 'bedroom', 'kitchen'],
            roomNames: ['🌳 Двор', '🛏️ Спальня', '🍳 Кухня'],
            currentRoomIndex: 1,
            
            isSleeping: false,
            currentExcursion: null, // null, 'park', 'beach', 'amusement'
            activeDelivery: safeLoad('nhub_delivery', null),

            // Музыкальный плеер встроенный в игру
            audioPlayer: new Audio(),

            shopItems: {
                // СПАЛЬНЯ (Скорректированы координаты, чтобы не было наложения)
                'wardrobe': { room: 'bedroom', name: 'Шкаф', price: 10, emoji: '👗', top: '48%', left: '5%', action: () => game.openWardrobe() },
                'diary': { room: 'bedroom', name: 'Дневник', price: 20, emoji: '📔', top: '58%', left: '30%', action: () => game.openDiary() },
                'phone': { room: 'bedroom', name: 'Смартфон', price: 60, emoji: '📱', top: '45%', left: '15%', action: () => game.openPhone() },
                'pc': { room: 'bedroom', name: 'ПК', price: 50, emoji: '🖥️', top: '45%', left: '65%', action: () => { if(game.consumeEnergy(10)) game.openPCGame() } },
                'bed': { room: 'bedroom', name: 'Кровать', price: 15, emoji: '🛏️', top: '60%', left: '5%', action: () => game.toggleSleep() },
                'lamp': { room: 'bedroom', name: 'Лампа', price: 10, emoji: '💡', top: '25%', left: '15%', action: () => { if(game.consumeEnergy(15)) game.startParty() } },
                'plant': { room: 'bedroom', name: 'Цветок', price: 5, emoji: '🪴', top: '65%', left: '80%', action: () => { if(game.consumeEnergy(5)) game.waterPlant() } },
                'boombox': { room: 'bedroom', name: 'Музыка', price: 40, emoji: '📻', top: '25%', left: '45%', action: () => game.openMusicPlayer() },
                'oracle': { room: 'bedroom', name: 'Оракул', price: 70, emoji: '🔮', top: '45%', left: '85%', action: () => game.useOracle() },
                
                // ДВОР
                'hammock': { room: 'yard', name: 'Гамак', price: 20, emoji: '🛶', top: '45%', left: '15%', action: () => game.openHammockMG() },
                'doghouse': { room: 'yard', name: 'Будка', price: 30, emoji: '🛖', top: '55%', left: '75%', action: () => game.openDoghouse() },
                'garden': { room: 'yard', name: 'Грядка', price: 40, emoji: '🌱', top: '68%', left: '20%', action: () => game.interactGarden() },
                'pool': { room: 'yard', name: 'Бассейн', price: 100, emoji: '🏊', top: '65%', left: '75%', action: () => game.openPoolMG() },

                // КУХНЯ
                'fridge': { room: 'kitchen', name: 'Холод-к', price: 25, emoji: '🧊', top: '38%', left: '15%', action: () => game.openFridge() },
                'stove': { room: 'kitchen', name: 'Плита', price: 35, emoji: '♨️', top: '48%', left: '70%', action: () => game.openStoveMG() },
                'bowl': { room: 'kitchen', name: 'Миска', price: 15, emoji: '🥣', top: '75%', left: '25%', action: () => game.openBowl() }
            },

            petList: ['🤖', '🐱', '🐶', '🐹', '🐰', '🦊', '🦄', '🐲', '👽', '👻'],

            init() {
                if (!this.diary[this.currentDiaryDate]) this.diary[this.currentDiaryDate] = "";
                this.updateRoomUI();
                this.updateUI();
                setInterval(() => this.checkDelivery(), 1000);
            },

            consumeEnergy(amount) {
                if (this.energy >= amount) {
                    this.energy -= amount; this.updateUI(); return true;
                } else {
                    this.customAlert('Усталость 🥱', 'Мало энергии! Отправь питомца спать 🛏️ или покорми.'); return false;
                }
            },

            changeRoom(direction) {
                if (this.isSleeping || this.currentExcursion) return;
                this.currentRoomIndex += direction;
                if (this.currentRoomIndex < 0) this.currentRoomIndex = 0;
                if (this.currentRoomIndex > 2) this.currentRoomIndex = 2;
                this.updateRoomUI();
            },

            updateRoomUI() {
                const body = document.body.style; const wall = document.querySelector('.wall').style; const floor = document.querySelector('.floor').style;
                const title = document.getElementById('room-title');
                const interactBtn = document.getElementById('excursion-interaction');
                
                if (this.currentExcursion) {
                    document.getElementById('nav-left').style.display = 'none'; document.getElementById('nav-right').style.display = 'none';
                    document.getElementById('furniture-layer').style.display = 'none'; document.getElementById('excursion-btn').style.display = 'block';
                    interactBtn.style.display = 'block';
                    document.getElementById('delivery-layer').innerHTML = ''; // Прячем доставку на улице
                    
                    if (this.currentExcursion === 'park') {
                        title.innerText = '🌲 Природный парк'; interactBtn.innerText = '🍄';
                        body.background = "#81c784"; wall.background = "#aed581"; floor.background = "#689f38"; wall.boxShadow = "none";
                    } else if (this.currentExcursion === 'beach') {
                        title.innerText = '🏖️ Пляж'; interactBtn.innerText = '🏰';
                        body.background = "#4fc3f7"; wall.background = "#81d4fa"; floor.background = "#ffe082"; floor.borderTop = "4px solid #ffca28"; wall.boxShadow = "none";
                    } else if (this.currentExcursion === 'amusement') {
                        title.innerText = '🎡 Аттракционы'; interactBtn.innerText = '🎪';
                        body.background = "#ce93d8"; wall.background = "#e1bee7"; floor.background = "#ab47bc"; floor.borderTop = "4px solid #8e24aa"; wall.boxShadow = "none";
                    }
                } else {
                    document.getElementById('furniture-layer').style.display = 'block'; document.getElementById('excursion-btn').style.display = 'none';
                    interactBtn.style.display = 'none';
                    title.innerText = this.roomNames[this.currentRoomIndex];
                    document.getElementById('nav-left').style.display = this.currentRoomIndex === 0 ? 'none' : 'block';
                    document.getElementById('nav-right').style.display = this.currentRoomIndex === 2 ? 'none' : 'block';
                    
                    if (this.currentRoomIndex === 0) {
                        body.background = "#87CEEB"; wall.background = "#87CEEB"; floor.background = "#7CFC00"; floor.borderTop = "4px solid #32CD32"; wall.boxShadow = "none";
                        this.renderDeliveryBox(); // Если мы вернулись во двор, проверяем коробку
                    } else if (this.currentRoomIndex === 2) {
                        body.background = "#FFFACD"; wall.background = "#FFFACD"; floor.background = "#F4A460"; floor.borderTop = "4px solid #D2691E"; wall.boxShadow = "none";
                        document.getElementById('delivery-layer').innerHTML = '';
                    } else {
                        this.applyTheme(this.theme);
                        document.getElementById('delivery-layer').innerHTML = '';
                    }
                    this.renderFurniture();
                }
            },

            clickPet() {
                if (this.isSleeping) { this.showFloatingText('Zzz...'); return; }
                if (!this.consumeEnergy(1)) return;
                let multiplier = this.currentExcursion ? 2 : 1;
                let earned = this.clickPower * multiplier;
                this.candies += earned; this.updateUI(); this.showFloatingText(`+${earned} 🍬`);
            },

            updatePetVisual() {
                const petEl = document.getElementById('pet'); const clothesEl = document.getElementById('pet-clothes');
                if (this.isSleeping) { petEl.innerText = '💤'; clothesEl.innerText = ''; } 
                else {
                    petEl.innerText = this.pet;
                    if (this.currentCloth && this.clothesData[this.currentCloth]) {
                        const cloth = this.clothesData[this.currentCloth]; clothesEl.innerText = cloth.emoji; clothesEl.style.top = cloth.offset;
                    } else { clothesEl.innerText = ''; }
                }
            },

            updateUI() {
                document.getElementById('candy-count').innerText = this.candies; document.getElementById('energy-count').innerText = this.energy;
                this.updatePetVisual();
                localStorage.setItem('nhub_candies', this.candies); localStorage.setItem('nhub_energy', this.energy);
                localStorage.setItem('nhub_clothes', JSON.stringify(this.unlockedClothes)); localStorage.setItem('nhub_cloth', this.currentCloth);
                localStorage.setItem('nhub_foods', JSON.stringify(this.foods)); localStorage.setItem('nhub_inv', JSON.stringify(this.inventory));
            },

            renderFurniture() {
                if (this.currentExcursion) return;
                const layer = document.getElementById('furniture-layer'); layer.innerHTML = '';
                if (this.plantLevel >= 5 && this.shopItems['plant']) { this.shopItems['plant'].emoji = '🌳'; this.shopItems['plant'].name = 'Дерево'; }
                if (this.shopItems['garden']) {
                    if (this.gardenState === 0) { this.shopItems['garden'].emoji = '🟫'; this.shopItems['garden'].name = 'Земля'; }
                    if (this.gardenState === 1) { this.shopItems['garden'].emoji = '🌱'; this.shopItems['garden'].name = 'Ростки'; }
                    if (this.gardenState === 2) { this.shopItems['garden'].emoji = '🌾'; this.shopItems['garden'].name = 'Урожай'; }
                }
                const currentRoomName = this.rooms[this.currentRoomIndex];
                this.inventory.forEach(id => {
                    const item = this.shopItems[id];
                    if(item && item.room === currentRoomName) {
                        const div = document.createElement('div'); div.className = 'placed-item'; div.style.top = item.top; div.style.left = item.left;
                        div.innerHTML = `${item.emoji}<span>${item.name}</span>`;
                        div.onclick = (e) => { e.stopPropagation(); if(this.isSleeping && id !== 'bed') { this.showFloatingText('Zzz...'); return; } item.action(); };
                        layer.appendChild(div);
                    }
                });
            },

            // ==========================================
            // ТЕЛЕФОН И ПРИЛОЖЕНИЯ
            // ==========================================
            openPhone() {
                document.getElementById('modal-title').innerText = "12:00 🔋 100%"; document.getElementById('modal-container').classList.add('phone-bg'); document.getElementById('modal-header').classList.add('phone-header');
                document.getElementById('modal-body').innerHTML = `
                    <div class="grid" style="gap: 20px;">
                        <div class="app-icon" style="background: #ff9f43; color: white;" onclick="game.openNyashEats()"><span>🍔</span> NyashEats</div>
                        <div class="app-icon" style="background: #feca57;" onclick="game.openNyashGo()"><span>🚕</span> NyashGo</div>
                        <div class="app-icon" style="background: #ff6b6b; color: white;" onclick="game.openMarket()"><span>📦</span> MarketPlace</div>
                        <div class="app-icon" style="background: #48dbfb;" onclick="game.openNyashgram()"><span>💬</span> NyashGram</div>
                    </div>
                `;
                document.getElementById('modal').classList.remove('hidden');
            },

                    if (!this.clothesData[id].premium) {
                        const item = this.clothesData[id]; const isOwned = this.unlockedClothes.includes(id); const isEq = this.currentCloth === id;
                        html += `<div class="card ${isEq ? 'active' : ''}" onclick="game.interactCloth('${id}')"><div style="font-size:35px">${item.emoji}</div><b style="color:#ff6b8b">${item.name}</b><br><small>${isOwned ? (isEq ? 'Надето' : 'В шкафу') : item.price + ' 🍬'}</small></div>`;
                    }
                }
                for (let id in this.clothesData) {
                    if (this.clothesData[id].premium && this.unlockedClothes.includes(id)) {
                        const item = this.clothesData[id]; const isEq = this.currentCloth === id;
                        html += `<div class="card ${isEq ? 'active' : ''}" onclick="game.interactCloth('${id}')"><div style="font-size:35px">${item.emoji}</div><b style="color:#ff6b8b">${item.name}</b><br><small style="color:red; font-weight:bold;">Эксклюзив</small><br><small>${isEq ? 'Надето' : 'В шкафу'}</small></div>`;
                    }
                }
                html += '</div>'; document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.remove('hidden');
            },
            equipCloth(id) { this.currentCloth = id; this.updateUI(); this.openWardrobe(); },
            interactCloth(id) {
                if (this.unlockedClothes.includes(id)) { this.equipCloth(id); } 
                else { const item = this.clothesData[id]; if (this.candies >= item.price) { this.candies -= item.price; this.unlockedClothes.push(id); this.updateUI(); this.openWardrobe(); this.showFloatingText('Куплено! 👗'); } else { this.customAlert('Гардероб', 'Не хватает конфет! 🍬'); } }
            },

            interactGarden() {
                if (this.gardenState === 0) { if (this.consumeEnergy(5)) { this.gardenState = 1; this.updateUI(); this.renderFurniture(); this.customAlert('Грядка', 'Ты посадил семена! 🌱 (-5 ⚡)'); } }
                else if (this.gardenState === 1) { if (this.consumeEnergy(5)) { this.gardenState = 2; this.updateUI(); this.renderFurniture(); this.customAlert('Грядка', 'Ты полил грядку! 💧 (-5 ⚡)<br>Урожай созрел!'); } }
                else if (this.gardenState === 2) { this.gardenState = 0; this.candies += 15; this.updateUI(); this.renderFurniture(); this.customAlert('Грядка', 'Урожай собран! 🌾 (+15 🍬)'); }
            },

            openFridge() {
                document.getElementById('modal-title').innerText = "Супермаркет (Покупка)";
                document.getElementById('modal-body').innerHTML = `<div style="text-align:center; margin-bottom:10px; color:#666;">Покупай продукты. Ешь из Миски 🥣.</div><div class="grid"><div class="card" onclick="game.buyFood('apple')"><div style="font-size:35px">🍎</div><b>Яблоко</b><br><small>2 🍬 (15⚡)</small></div><div class="card" onclick="game.buyFood('drink')"><div style="font-size:35px">🥫</div><b>Энергетик</b><br><small>5 🍬 (40⚡)</small></div><div class="card" onclick="game.buyFood('cake')" style="grid-column: span 2;"><div style="font-size:35px">🍰</div><b>Торт</b><br><small>12 🍬 (100⚡)</small></div></div>`; document.getElementById('modal').classList.remove('hidden');
            },
            buyFood(type) { const prices = { 'apple': 2, 'drink': 5, 'cake': 12 }; if (this.candies >= prices[type]) { this.candies -= prices[type]; this.foods[type] = (this.foods[type] || 0) + 1; this.updateUI(); this.showFloatingText('Куплено! 🛒'); } else { this.customAlert('Ошибка', 'Не хватает конфет! 🍬'); } },

            openBowl() {
                document.getElementById('modal-title').innerText = "Миска (Инвентарь еды)"; let html = `<div style="text-align:center; margin-bottom:15px; font-weight:bold; color:#ff6b8b;">Энергия: ${this.energy}/${this.maxEnergy} ⚡</div><div class="grid">`;
                const foodData = { 'apple': { emoji: '🍎', name: 'Яблоко', restore: 15 }, 'drink': { emoji: '🥫', name: 'Энергетик', restore: 40 }, 'cake': { emoji: '🍰', name: 'Торт', restore: 100 }, 'pie': { emoji: '🥧', name: 'Пирог', restore: 50 }, 'burger': { emoji: '🍔', name: 'Бургер', restore: 120 }, 'pizza': { emoji: '🍕', name: 'Пицца', restore: 200 } };
                let hasFood = false; for (let key in this.foods) { if (this.foods[key] > 0) { hasFood = true; html += `<div class="card" onclick="game.eatFood('${key}')"><div style="font-size:35px">${foodData[key].emoji}</div><b>${foodData[key].name}</b><br><small>В наличии: ${this.foods[key]} шт.</small><br><small style="color:#4caf50;">+${foodData[key].restore} ⚡</small></div>`; } }
                if (!hasFood) html += `<div style="grid-column:span 2; text-align:center;">Тут пусто! Купи еду или приготовь на плите.</div>`; html += `</div>`; document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.remove('hidden');
            },
            eatFood(type) { if (this.energy >= this.maxEnergy) { this.customAlert('Миска', 'Питомец не голоден! ⚡ на максимуме.'); return; } const restores = { 'apple': 15, 'drink': 40, 'cake': 100, 'pie': 50, 'burger': 120, 'pizza': 200 }; this.foods[type]--; this.energy = Math.min(this.maxEnergy, this.energy + restores[type]); this.updateUI(); this.showFloatingText('+⚡'); this.openBowl(); },

            openSettings() {
                if (this.isSleeping) { this.showFloatingText('Zzz...'); return; } document.getElementById('modal-title').innerText = "Настройки (Темы)";
                document.getElementById('modal-body').innerHTML = `
                    <div class="grid">
                        <div class="card" onclick="game.applyTheme('theme-pink')" style="background:#ffeaef; border-color:#ff8fa3;">Розовый 🌸</div>
                        <div class="card" onclick="game.applyTheme('theme-dark')" style="background:#0b0f19; color:white; border-color:#334155;">Ночь 🌙</div>
                        <div class="card" onclick="game.applyTheme('theme-neon')" style="background:#000; color:#39ff14; border-color:#39ff14;">Неон ⚡</div>
                        <div class="card" onclick="game.applyTheme('theme-ocean')" style="background:#e0f7fa; color:#006064; border-color:#26c6da;">Океан 🌊</div>
                        <div class="card" onclick="game.applyTheme('theme-forest')" style="background:#e8f5e9; color:#1b5e20; border-color:#4caf50;">Лес 🌲</div>
                        <div class="card" onclick="game.applyTheme('theme-gold')" style="background:#fff8e1; color:#f57f17; border-color:#ffb300;">Золото ✨</div>
                    </div>
                `; document.getElementById('modal').classList.remove('hidden');
            },
            applyTheme(t) {
                this.theme = t; const body = document.body.style; const wall = document.querySelector('.wall').style; const floor = document.querySelector('.floor').style; wall.boxShadow = "none";
                if (this.currentRoomIndex === 1 && !this.currentExcursion) {
                    if(t === 'theme-pink') { body.background = "#ffeaef"; wall.background = "#ffc2d1"; floor.background = "#fb6f92"; floor.borderTop = "4px solid rgba(0,0,0,0.05)"; }
                    else if(t === 'theme-dark') { body.background = "#0b0f19"; wall.background = "#141b2d"; floor.background = "#1f2940"; floor.borderTop = "4px solid #0b0f19"; }
                    else if(t === 'theme-neon') { body.background = "#000000"; wall.background = "#050505"; floor.background = "#0a0a0a"; floor.borderTop = "4px solid #39ff14"; wall.boxShadow = "inset 0 -15px 30px rgba(57, 255, 20, 0.15)"; }
                    else if(t === 'theme-ocean') { body.background = "#e0f7fa"; wall.background = "#b2ebf2"; floor.background = "#4dd0e1"; floor.borderTop = "4px solid rgba(0,0,0,0.05)"; }
                    else if(t === 'theme-forest') { body.background = "#e8f5e9"; wall.background = "#c8e6c9"; floor.background = "#81c784"; floor.borderTop = "4px solid #4caf50"; }
                    else if(t === 'theme-gold') { body.background = "#fff8e1"; wall.background = "#ffecb3"; floor.background = "#ffd54f"; floor.borderTop = "4px solid #ffca28"; }
                } this.updateUI();
            },

            customAlert(title, text) {
                this.clearMinigames(); this.closePhoneStyles(); document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerHTML = `<div style="text-align:center; font-size:18px; padding:20px; color:#333; font-weight:bold;">${text}</div><button class="card active" style="width:100%; margin-top:10px; border:none;" onclick="game.close()">Понятно 💖</button>`; document.getElementById('modal').classList.remove('hidden');
            },

            openDiary() {
                document.getElementById('modal-title').innerText = "Мой Дневник"; let dateSelect = `<select onchange="game.changeDiaryDate(this.value)" style="width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:2px solid #ff8fa3; font-weight:bold; outline:none; color:#ff6b8b;">`;
                Object.keys(this.diary).forEach(date => { dateSelect += `<option value="${date}" ${date === this.currentDiaryDate ? 'selected' : ''}>${date}</option>`; }); dateSelect += `</select>`;
                document.getElementById('modal-body').innerHTML = `${dateSelect}<textarea id="diary-area" style="width:100%; height:150px; border-radius:15px; padding:10px; border:2px solid #ff8fa3; font-family:inherit; resize:none; font-size:16px;">${this.diary[this.currentDiaryDate]}</textarea><button class="card active" style="width:100%; margin-top:10px; border:none;" onclick="game.saveNotes()">Сохранить 💾</button>`; document.getElementById('modal').classList.remove('hidden');
            },
            changeDiaryDate(date) { this.diary[this.currentDiaryDate] = document.getElementById('diary-area').value; this.currentDiaryDate = date; this.openDiary(); },
            saveNotes() { this.diary[this.currentDiaryDate] = document.getElementById('diary-area').value; this.updateUI(); this.close(); this.showFloatingText('Сохранено! 📝'); },

            waterPlant() { if (this.plantLevel >= 5) { this.customAlert("🪴 Цветок", "🌳 Дерево выросло до максимума!"); return; } this.plantLevel++; this.updateUI(); this.renderFurniture(); this.showFloatingText(`Уровень ${this.plantLevel}/5 💧`); },

            toggleSleep() {
                if (this.isSleeping) { this.isSleeping = false; clearInterval(this.sleepInterval); this.updatePetVisual(); this.customAlert('Пробуждение ☀️', 'Питомец проснулся!'); } 
                else { this.isSleeping = true; this.updatePetVisual(); this.customAlert('Сон 🛏️', 'Питомец уснул... (+5 ⚡ и +1 🍬 / мин)'); this.sleepInterval = setInterval(() => { this.candies += 1; this.energy = Math.min(this.maxEnergy, this.energy + 5); this.updateUI(); this.showFloatingText('+1 🍬 | +5 ⚡'); }, 60000); }
            },

            startParty() {
                if (this.partyActive) return; this.partyActive = true; this.clickPower = 3; this.close(); this.showFloatingText('CANDY PARTY! x3 🍬');
                const body = document.body.style; const wall = document.querySelector('.wall').style; const floor = document.querySelector('.floor').style; const colors = ['#ff007f', '#00ff00', '#00d4ff', '#ffea00', '#9d00ff', '#ff3300'];
                let partyInterval = setInterval(() => { let randomColor = colors[Math.floor(Math.random() * colors.length)]; body.background = randomColor; wall.background = randomColor; floor.background = randomColor; }, 300);
                setTimeout(() => { clearInterval(partyInterval); this.partyActive = false; this.clickPower = 1; this.updateRoomUI(); this.customAlert("🎉 Party!", "Candy Party окончена! Остываем... 😮‍💨"); }, 10000);
            },

            showFloatingText(txt) {
                const el = document.createElement('div'); el.innerText = txt; el.style.position = 'absolute'; el.style.left = '50%'; el.style.bottom = '30%'; el.style.color = 'white'; el.style.textShadow = '0px 2px 4px rgba(0,0,0,0.5)'; el.style.fontWeight = 'bold'; el.style.fontSize = '24px'; el.style.transition = '1s'; el.style.zIndex = '100'; el.style.pointerEvents = 'none'; el.style.transform = 'translateX(-50%)';
                document.body.appendChild(el); setTimeout(() => { el.style.transform = 'translate(-50%, -50px)'; el.style.opacity = '0'; }, 10); setTimeout(() => el.remove(), 1000);
            },

            buy(id) { const item = this.shopItems[id]; if (this.candies >= item.price && !this.inventory.includes(id)) { this.candies -= item.price; this.inventory.push(id); this.updateUI(); this.renderFurniture(); this.openShop(); } },

            openShop() {
                if (this.isSleeping) { this.showFloatingText('Zzz...'); return; }
                if (this.currentExcursion) { this.customAlert('Магазин 🛒', 'Питомец сейчас на улице! Вернитесь домой, чтобы открыть магазин.'); return; }
                document.getElementById('modal-title').innerText = `Магазин (${this.roomNames[this.currentRoomIndex]})`; let html = '<div class="grid">'; const currentRoomName = this.rooms[this.currentRoomIndex]; let hasItems = false;
                for (let id in this.shopItems) {
                    if (this.shopItems[id].room === currentRoomName) {
                        hasItems = true; const isOwned = this.inventory.includes(id);
                        html += `<div class="card ${isOwned ? 'active' : ''}" onclick="game.buy('${id}')"><div style="font-size:40px">${this.shopItems[id].emoji}</div><b style="color:#ff6b8b">${this.shopItems[id].name}</b><br><small>${isOwned ? 'Куплено' : this.shopItems[id].price + ' 🍬'}</small></div>`;
                    }
                }
                if (!hasItems) html += `<div style="grid-column: span 2; text-align:center;">Пусто!</div>`; html += '</div>'; document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.remove('hidden');
            },

            openPets() {
                if (this.isSleeping) { this.showFloatingText('Zzz...'); return; } document.getElementById('modal-title').innerText = "Питомцы"; let html = '<div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 8px;">';
                this.petList.forEach(p => { html += `<div class="card ${this.pet === p ? 'active' : ''}" onclick="game.setPet('${p}')" style="font-size:35px; padding:10px;">${p}</div>`; });
                html += '</div>'; document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.remove('hidden');
            },

            setPet(emoji) { this.pet = emoji; this.updateUI(); this.close(); },
            close() { this.clearMinigames(); this.closePhoneStyles(); document.getElementById('modal').classList.add('hidden'); },
            closeBg(e) { if (e.target.id === 'modal') this.close(); }
        };

        window.addEventListener('DOMContentLoaded', () => { game.init(); });
    </script>
</body>
</html>
