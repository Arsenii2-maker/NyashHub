<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub | Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-pink">

    <div id="app-container">
        <header class="ui-layer">
            <div id="btn-shop" class="stat-badge">
                🍬 <span id="balance">0</span>
            </div>
            <div class="controls">
                <button id="btn-pets" class="icon-btn"><i class="fas fa-paw"></i></button>
                <button id="btn-settings" class="icon-btn"><i class="fas fa-magic"></i></button>
            </div>
        </header>

        <main id="scene">
            <div class="environment">
                <div class="wall"></div>
                <div class="floor"></div>
            </div>
            
            <div id="furniture-overlay"></div>

            <div id="pet-trigger" class="pet-actor">
                <div id="pet-view">🤖</div>
                <div class="pet-shadow"></div>
            </div>
        </main>

        <section id="modal-overlay" class="modal-system hidden">
            <div class="modal-card">
                <div class="modal-nav">
                    <h2 id="modal-title">Меню</h2>
                    <button id="modal-close" class="close-x">&times;</button>
                </div>
                <div id="modal-body" class="scroll-box"></div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
