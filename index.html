<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub | My Room</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cherry-blossom font-rounded">

    <div id="nyash-world">
        <div class="light-fx"></div>
        <div class="window-glare"></div>

        <div class="room-scene">
            
            <div class="room-obj wardrobe" onclick="UI.toggleModal('settings')">
                <div class="obj-icon">👗</div>
                <span class="obj-label">Гардероб</span>
            </div>

            <div class="room-obj desk" onclick="UI.toggleModal('diary')">
                <div class="obj-icon">📔</div>
                <span class="obj-label">Дневник</span>
            </div>

            <div class="room-obj shelf" onclick="UI.toggleModal('oracle')">
                <div class="obj-icon">🔮</div>
                <span class="obj-label">Оракул</span>
            </div>

            <div class="pet-wrapper" onclick="NyashPet.tap()">
                <div id="pet-msg" class="pet-speech hidden">Ня! ✨</div>
                <div class="pet-shadow"></div>
                <div id="pet-main" class="pet-anim">🤖</div>
            </div>

        </div>

        <div class="top-hud">
            <div class="candy-bar glass-ui">
                <span class="icon">🍬</span>
                <span id="count">0</span>
            </div>
        </div>

        <div id="ui-layer" class="hidden">
            <div class="modal-card glass-heavy">
                <div id="modal-content"></div>
                <button class="nyash-btn close" onclick="UI.close()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
