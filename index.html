<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NyashHub</title>
    
    <style>
        /* Блокировка выделения и системного зума */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: sans-serif; 
            background: #ffeaef; 
            transition: background 0.3s; 
        }

        #app { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }

        .room-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .wall { width: 100%; height: 60%; background: #ffc2d1; transition: background 0.3s, box-shadow 0.3s; }
        .floor { width: 100%; height: 40%; background: #fb6f92; border-top: 4px solid rgba(0,0,0,0.05); transition: background 0.3s, border-top 0.3s; }

        #room-title { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 15; font-size: 24px; font-weight: bold; color: #ff6b8b; background: rgba(255,255,255,0.7); padding: 5px 15px; border-radius: 20px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 20; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border: none; border-radius: 50%; font-size: 30px; color: #ff6b8b; cursor: pointer; transition: opacity 0.2s; }
        #nav-left { left: 10px; }
        #nav-right { right: 10px; }
        .nav-disabled { opacity: 0.3; pointer-events: none; }

        #hud { position: absolute; top: 30px; left: 20px; right: 20px; z-index: 20; display: flex; justify-content: space-between; }
        .badge { background: white; padding: 10px 15px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #pet-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 10; transition: bottom 0.2s ease-out; }
        #pet { font-size: 110px; position: relative; }
        #pet-clothes { position: absolute; left: 50%; transform: translateX(-50%); font-size: 65px; z-index: 11; top: -10px; pointer-events: none; }

        #furniture-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .placed-item { position: absolute; font-size: 55px; cursor: pointer; text-align: center; }
        .placed-item span { display: block; font-size: 12px; background: white; border-radius: 10px; padding: 2px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 380px; border-radius: 30px; padding: 20px; position: relative; max-height: 80vh; overflow-y: auto; }
        .hidden { display: none !important; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #f0f0f0; padding: 15px; border-radius: 20px; text-align: center; border: 3px solid transparent; cursor: pointer; }
        .card.active { border-color: #ff8fa3; background: #fff0f3; }

        /* Стили миниигр и анимаций */
        #star-game { width: 100%; height: 200px; background: #0b0f19; border-radius: 20px; position: relative; overflow: hidden; margin-top: 10px; }
        .falling-star { position: absolute; font-size: 40px; cursor: pointer; animation: starFall 1.2s linear forwards; }
        @keyframes starFall { 0% { top: -50px; } 100% { top: 220px; } }
        
        #coffee-progress { width: 100%; height: 15px; background: #eee; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        #coffee-fill { width: 0%; height: 100%; background: #6f4e37; transition: width 0.1s linear; }

        @keyframes jumpAnim { 0%, 100% { bottom: 15%; } 50% { bottom: 45%; } }
        .pet-jumping { animation: jumpAnim 0.6s ease-in-out infinite; }

        #blocker { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99; display: none; }
        .sleep-overlay { background: rgba(0,0,50,0.4); }
    </style>
</head>
<body>
    <div id="app">
        <div class="room-bg" id="room-bg">
            <div class="wall" id="wall"></div>
            <div class="floor" id="floor"></div>
        </div>

        <button id="nav-left" class="nav-btn" onclick="game.changeRoom(-1)">‹</button>
        <div id="room-title">Спальня</div>
        <button id="nav-right" class="nav-btn" onclick="game.changeRoom(1)">›</button>

        <div id="furniture-layer"></div>

        <div id="pet-container" onclick="game.clickPet()">
            <div id="pet-clothes"></div>
            <div id="pet">🤖</div>
        </div>

        <div id="hud">
            <div class="badge">🍬 <span id="candy-count">0</span> | ⚡ <span id="energy-count">100</span></div>
            <div style="display: flex; gap: 5px;">
                <button onclick="game.openSettings()" style="padding: 10px; border-radius: 50%; border: none; background: white; font-size: 16px;">⚙️</button>
                <button onclick="game.openShop()" style="padding: 10px; border-radius: 50%; border: none; background: white; font-size: 16px;">🛒</button>
            </div>
        </div>

        <div id="blocker"></div>

        <div id="modal" class="hidden" onclick="if(event.target.id==='modal') game.close()">
            <div class="modal-content">
                <h2 id="modal-title" style="margin-bottom: 15px; text-align: center; color: #ff6b8b;">Меню</h2>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script>
        // Запрет системных жестов зума (особенно iOS)
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });

        const game = {
            candies: parseInt(localStorage.getItem('nhub_candies')) || 0,
            energy: parseInt(localStorage.getItem('nhub_energy')) || 100,
            pet: localStorage.getItem('nhub_pet') || '🤖',
            clothes: localStorage.getItem('nhub_clothes') || '', // Задел под одежду
            theme: localStorage.getItem('nhub_theme') || 'theme-pink',
            inventory: JSON.parse(localStorage.getItem('nhub_inv')) || [],
            currentRoom: 1, // 0-двор, 1-спальня, 2-кухня
            isSleeping: false,
            
            shopItems: {
                'telescope': { room: 0, name: 'Телескоп', price: 60, emoji: '🔭', top: '35%', left: '70%', action: () => game.playTelescope() },
                'trampoline': { room: 0, name: 'Батут', price: 80, emoji: '🤸', top: '65%', left: '20%', action: () => game.startJump() },
                'hammock': { room: 0, name: 'Гамак', price: 40, emoji: '🏕️', top: '45%', left: '10%', action: () => game.useHammock() },
                'coffeemachine': { room: 2, name: 'Кофе', price: 50, emoji: '☕', top: '50%', left: '15%', action: () => game.makeCoffee() },
                'bed': { room: 1, name: 'Кровать', price: 0, emoji: '🛏️', top: '60%', left: '10%', action: () => game.toggleSleep() }
            },

            init() {
                if(!this.inventory.includes('bed')) this.inventory.push('bed');
                document.getElementById('pet-clothes').innerText = this.clothes;
                this.updateRoomUI();
                this.updateUI();
            },

            updateUI() {
                document.getElementById('candy-count').innerText = this.candies;
                document.getElementById('energy-count').innerText = this.energy;
                document.getElementById('pet').innerText = this.pet;
                localStorage.setItem('nhub_candies', this.candies);
                localStorage.setItem('nhub_energy', this.energy);
            },

            changeRoom(dir) {
                if (this.isSleeping) return this.customAlert("Сон", "Сначала нужно проснуться! 💤");
                this.currentRoom += dir;
                if(this.currentRoom < 0) this.currentRoom = 0;
                if(this.currentRoom > 2) this.currentRoom = 2;
                this.updateRoomUI();
            },

            updateRoomUI() {
                const wall = document.getElementById('wall');
                const floor = document.getElementById('floor');
                const title = document.getElementById('room-title');
                
                // ЖЁСТКИЙ СБРОС ТЕНЕЙ И БОРДЮРОВ ДЛЯ ВСЕХ КОМНАТ
                wall.style.boxShadow = "none";
                floor.style.borderTop = "4px solid rgba(0,0,0,0.05)";

                if (this.currentRoom === 1) { 
                    title.innerText = "🛏️ Спальня";
                    this.applyTheme(this.theme); 
                } else if (this.currentRoom === 0) { 
                    title.innerText = "🌳 Двор";
                    // Жёсткий сброс на цвета двора
                    wall.style.background = "#87CEEB";
                    floor.style.background = "#7CFC00";
                    floor.style.borderTop = "4px solid #32CD32";
                } else { 
                    title.innerText = "🍳 Кухня";
                    // Жёсткий сброс на цвета кухни
                    wall.style.background = "#FFFACD";
                    floor.style.background = "#F4A460";
                    floor.style.borderTop = "4px solid #D2691E";
                }
                this.renderFurniture();
            },

            // ВСЕ ПРЕЖНИЕ 6 ТЕМ
            applyTheme(t) {
                if(this.currentRoom !== 1) return; 
                this.theme = t;
                localStorage.setItem('nhub_theme', t);
                const wall = document.getElementById('wall');
                const floor = document.getElementById('floor');

                const themes = {
                    'theme-pink': { w: '#ffc2d1', f: '#fb6f92', b: 'rgba(0,0,0,0.05)' },
                    'theme-dark': { w: '#141b2d', f: '#1f2940', b: 'rgba(255,255,255,0.05)' },
                    'theme-neon': { w: '#050505', f: '#0a0a0a', b: '#39ff14' },
                    'theme-ocean': { w: '#b2ebf2', f: '#4dd0e1', b: 'rgba(0,0,0,0.05)' },
                    'theme-nature': { w: '#d4edda', f: '#28a745', b: '#155724' },
                    'theme-space': { w: '#2b1055', f: '#7597de', b: '#b2ebf2' }
                };
                
                const sel = themes[t] || themes['theme-pink'];
                wall.style.background = sel.w;
                floor.style.background = sel.f;
                floor.style.borderTop = `4px solid ${sel.b}`;
            },

            renderFurniture() {
                const layer = document.getElementById('furniture-layer');
                layer.innerHTML = '';

                for(let id in this.shopItems) {
                    const it = this.shopItems[id];
                    if(it.room === this.currentRoom && this.inventory.includes(id)) {
                        const div = document.createElement('div');
                        div.className = 'placed-item';
                        div.style.top = it.top;
                        div.style.left = it.left;
                        div.innerHTML = `${it.emoji}<span>${it.name}</span>`;
                        
                        div.onclick = () => {
                            // Во сне нельзя нажимать ни на что, кроме кровати
                            if (this.isSleeping && id !== 'bed') {
                                return this.customAlert("Сон", "Сначала нужно проснуться! 💤");
                            }
                            it.action();
                        };
                        layer.appendChild(div);
                    }
                }
            },

            // МЕХАНИКА СНА (во сне можно взаимодействовать только с кроватью)
            toggleSleep() {
                this.isSleeping = !this.isSleeping;
                const app = document.getElementById('app');
                const navLeft = document.getElementById('nav-left');
                const navRight = document.getElementById('nav-right');

                if(this.isSleeping) {
                    app.classList.add('sleep-overlay');
                    navLeft.classList.add('nav-disabled');
                    navRight.classList.add('nav-disabled');
                    this.customAlert("Сон", "Питомец уснул. 💤 Ничего нельзя нажимать, кроме кровати.");
                } else {
                    app.classList.remove('sleep-overlay');
                    navLeft.classList.remove('nav-disabled');
                    navRight.classList.remove('nav-disabled');
                    this.customAlert("Пробуждение", "Доброе утро! ☀️");
                }
            },

            // ГАМАК (не расходует энергию)
            useHammock() {
                this.customAlert("Отдых", "Питомец качается в гамаке... Энергия не тратится! 🏕️");
            },

            // ИНТЕРАКТИВНЫЕ МИНИ-ИГРЫ
            playTelescope() {
                if(this.energy < 10) return this.customAlert("Усталость", "Нужно минимум 10 ⚡");
                this.energy -= 10;
                this.updateUI();

                document.getElementById('modal-title').innerText = "Звездопад 🌠";
                document.getElementById('modal-body').innerHTML = `
                    <p style="text-align:center;">Успей нажать на звезду!</p>
                    <div id="star-game"></div>
                `;
                document.getElementById('modal').classList.remove('hidden');

                const container = document.getElementById('star-game');
                
                setTimeout(() => {
                    if(document.getElementById('modal').classList.contains('hidden')) return;
                    
                    const star = document.createElement('div');
                    star.className = 'falling-star';
                    star.innerText = '⭐';
                    star.style.left = Math.random() * 80 + 10 + '%';
                    
                    star.onclick = () => {
                        this.candies += 30;
                        this.updateUI();
                        star.remove();
                        this.customAlert("Успех!", "Звезда поймана! +30 🍬");
                    };
                    
                    container.appendChild(star);
                    
                    setTimeout(() => {
                        if(star.parentNode) {
                            star.remove();
                            this.customAlert("Упс...", "Звезда улетела!");
                        }
                    }, 1200);
                }, 500);
            },

            startJump() {
                if(this.energy < 15) return this.customAlert("Усталость", "Нужно 15 ⚡");
                
                this.energy -= 15;
                this.updateUI();
                this.close();

                const pet = document.getElementById('pet-container');
                const blocker = document.getElementById('blocker');
                
                pet.classList.add('pet-jumping');
                blocker.style.display = 'block'; // Блокировка экрана на время прыжков
                
                let jumps = 0;
                const interval = setInterval(() => {
                    jumps++;
                    this.showFloatingText("ЮХУ! 🤸");
                    if(jumps >= 4) {
                        clearInterval(interval);
                        pet.classList.remove('pet-jumping');
                        blocker.style.display = 'none'; // Снимаем блокировку
                        this.candies += 25;
                        this.updateUI();
                        this.customAlert("Отлично!", "Разминка окончена! +25 🍬");
                    }
                }, 600);
            },

            makeCoffee() {
                if(this.energy >= 100) return this.customAlert("Бодрость", "Энергия и так на максимуме! ⚡");
                
                document.getElementById('modal-title').innerText = "Варка кофе ☕";
                document.getElementById('modal-body').innerHTML = `
                    <div style="text-align:center; font-weight:bold;">Ожидайте...</div>
                    <div id="coffee-progress"><div id="coffee-fill"></div></div>
                `;
                document.getElementById('modal').classList.remove('hidden');

                const fill = document.getElementById('coffee-fill');
                let progress = 0;
                const int = setInterval(() => {
                    progress += 4;
                    fill.style.width = progress + '%';
                    if(progress >= 100) {
                        clearInterval(int);
                        this.energy = Math.min(100, this.energy + 40);
                        this.updateUI();
                        setTimeout(() => this.customAlert("Готово!", "Кофе восстановил +40 ⚡"), 200);
                    }
                }, 100);
            },

            clickPet() {
                if(this.isSleeping) return; // Во сне пета нельзя кликать ради конфет
                this.candies += 1;
                this.showFloatingText("+1 🍬");
                this.updateUI();
            },

            showFloatingText(t) {
                const e = document.createElement('div');
                e.innerText = t;
                e.style.cssText = `position:fixed; left:50%; bottom:35%; color:#ff6b8b; font-weight:bold; z-index:1000; pointer-events:none; transition:1s; transform:translateX(-50%);`;
                document.body.appendChild(e);
                setTimeout(() => { e.style.transform = "translate(-50%, -80px)"; e.style.opacity = "0"; }, 20);
                setTimeout(() => e.remove(), 1000);
            },

            openSettings() {
                if(this.isSleeping) return this.customAlert("Сон", "Сначала проснись!");
                document.getElementById('modal-title').innerText = "Темы спальни";
                document.getElementById('modal-body').innerHTML = `
                    <div class="grid">
                        <div class="card" onclick="game.applyTheme('theme-pink'); game.close();">Розовый</div>
                        <div class="card" onclick="game.applyTheme('theme-dark'); game.close();">Тёмный</div>
                        <div class="card" onclick="game.applyTheme('theme-neon'); game.close();">Неон</div>
                        <div class="card" onclick="game.applyTheme('theme-ocean'); game.close();">Океан</div>
                        <div class="card" onclick="game.applyTheme('theme-nature'); game.close();">Природа</div>
                        <div class="card" onclick="game.applyTheme('theme-space'); game.close();">Космос</div>
                    </div>
                `;
                document.getElementById('modal').classList.remove('hidden');
            },

            openShop() {
                if(this.isSleeping) return this.customAlert("Сон", "Сначала проснись!");
                document.getElementById('modal-title').innerText = "Магазин";
                let html = '<div class="grid">';
                for(let id in this.shopItems) {
                    if(id === 'bed') continue;
                    const it = this.shopItems[id];
                    const owned = this.inventory.includes(id);
                    html += `
                        <div class="card ${owned?'active':''}" onclick="game.buy('${id}')">
                            <div style="font-size:30px">${it.emoji}</div>
                            <b>${it.name}</b><br>
                            <small>${owned?'Куплено':it.price+' 🍬'}</small>
                        </div>`;
                }
                html += '</div>';
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal').classList.remove('hidden');
            },

            buy(id) {
                const it = this.shopItems[id];
                if(this.candies >= it.price && !this.inventory.includes(id)) {
                    this.candies -= it.price;
                    this.inventory.push(id);
                    localStorage.setItem('nhub_inv', JSON.stringify(this.inventory));
                    this.updateUI();
                    this.renderFurniture();
                    this.openShop();
                }
            },

            customAlert(t, txt) {
                document.getElementById('modal-title').innerText = t;
                document.getElementById('modal-body').innerHTML = `
                    <div style="text-align:center; padding:10px;">${txt}</div>
                    <button onclick="game.close()" style="width:100%; padding:10px; margin-top:15px; border-radius:15px; border:none; background:#ff8fa3; color:white; font-weight:bold; font-size:16px;">ОК</button>
                `;
                document.getElementById('modal').classList.remove('hidden');
            },

            close() { document.getElementById('modal').classList.add('hidden'); }
        };

        game.init();
    </script>
</body>
</html>
