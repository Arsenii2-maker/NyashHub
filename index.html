<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffeaef">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #ffeaef; transition: background 0.3s; }

        #app { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

        .room-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .wall { width: 100%; height: 60%; background: #ffc2d1; transition: background 0.3s, box-shadow 0.3s; }
        .floor { width: 100%; height: 40%; background: #fb6f92; border-top: 4px solid rgba(0,0,0,0.05); transition: background 0.3s, border-color 0.3s; }

        /* Навигация по комнатам */
        #room-title { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 15; font-size: 24px; font-weight: bold; color: #ff6b8b; text-shadow: 0 2px 4px rgba(255,255,255,0.8); background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 20px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 20; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border: none; border-radius: 50%; font-size: 30px; color: #ff6b8b; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #nav-left { left: 10px; }
        #nav-right { right: 10px; }

        #hud { position: absolute; top: 30px; left: 20px; right: 20px; z-index: 20; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .badge { pointer-events: auto; background: white; padding: 12px 20px; border-radius: 20px; font-weight: bold; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: #ff6b8b; }
        .btn-group { display: flex; gap: 10px; pointer-events: auto; }
        .btn { width: 55px; height: 55px; background: white; border: none; border-radius: 50%; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #pet-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 10; cursor: pointer; text-align: center; }
        #pet { font-size: 130px; user-select: none; transition: filter 0.1s; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        #pet-container:active #pet { transform: scale(0.9); }

        #furniture-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .placed-item { position: absolute; pointer-events: auto; text-align: center; font-size: 55px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); cursor: pointer; transition: transform 0.1s, filter 0.1s; }
        .placed-item:active { transform: scale(0.9); }
        .placed-item span { display: block; font-size: 10px; background: white; color: #ff6b8b; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-top: -5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 35px; padding: 25px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #ff6b8b; }
        .close-btn { background: #fff0f3; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; color: #ff8fa3; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #f8f9fa; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 3px solid transparent; font-weight: bold; color: #333; }
        .card.active { border-color: #ff8fa3; background: #fff0f3; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div class="room-bg">
            <div class="wall"></div>
            <div class="floor"></div>
        </div>

        <button id="nav-left" class="nav-btn" onclick="game.changeRoom(-1)">‹</button>
        <div id="room-title">🛏️ Спальня</div>
        <button id="nav-right" class="nav-btn" onclick="game.changeRoom(1)">›</button>

        <div id="furniture-layer"></div>

        <div id="pet-container" onclick="game.clickPet()">
            <div id="pet">🤖</div>
        </div>

        <div id="hud">
            <div class="badge">🍬 <span id="candy-count">0</span></div>
            <div class="btn-group">
                <button class="btn" onclick="game.openShop()">🛒</button>
                <button class="btn" onclick="game.openPets()">🐾</button>
            </div>
        </div>

        <div id="modal" class="hidden" onclick="game.closeBg(event)">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Меню</h2>
                    <button class="close-btn" onclick="game.close()">×</button>
                </div>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script>
        function safeLoad(key, fallback) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : fallback;
            } catch (e) {
                return fallback;
            }
        }

        const game = {
            candies: parseInt(localStorage.getItem('nhub_candies')) || 0,
            pet: localStorage.getItem('nhub_pet') || '🤖',
            inventory: safeLoad('nhub_inv', []),
            theme: localStorage.getItem('nhub_theme') || 'theme-pink',
            
            diary: safeLoad('nhub_diary', {}),
            currentDiaryDate: new Date().toLocaleDateString('ru-RU'),
            plantLevel: parseInt(localStorage.getItem('nhub_plant')) || 0,
            partyActive: false,
            clickPower: 1,
            mgInterval: null,
            
            // Новая система комнат
            rooms: ['yard', 'bedroom', 'kitchen'],
            roomNames: ['🌳 Двор', '🛏️ Спальня', '🍳 Кухня'],
            currentRoomIndex: 1, // Начинаем со спальни
            
            // Новая система сна
            isSleeping: false,
            sleepInterval: null,

            shopItems: {
                // СПАЛЬНЯ (bedroom) - координаты исправлены, логика на месте
                'wardrobe': { room: 'bedroom', name: 'Шкаф', price: 10, emoji: '👗', top: '48%', left: '10%', action: () => game.openSettings() },
                'diary': { room: 'bedroom', name: 'Дневник', price: 20, emoji: '📔', top: '58%', left: '35%', action: () => game.openDiary() },
                'oracle': { room: 'bedroom', name: 'Оракул', price: 40, emoji: '🔮', top: '35%', left: '75%', action: () => game.askOracle() },
                'pc': { room: 'bedroom', name: 'ПК', price: 50, emoji: '🖥️', top: '45%', left: '70%', action: () => game.openMiniGame() },
                'bed': { room: 'bedroom', name: 'Кровать', price: 15, emoji: '🛏️', top: '60%', left: '10%', action: () => game.toggleSleep() },
                'lamp': { room: 'bedroom', name: 'Лампа', price: 10, emoji: '💡', top: '10%', left: '45%', action: () => game.startParty() },
                'plant': { room: 'bedroom', name: 'Цветок', price: 5, emoji: '🪴', top: '65%', left: '80%', action: () => game.waterPlant() },
                
                // ДВОР (yard) - исправлены координаты и добавлен уникальный интерактив
                'hammock': { room: 'yard', name: 'Гамак', price: 20, emoji: '🛶', top: '45%', left: '15%', action: () => { game.customAlert('Гамак', 'Ты покачался в гамаке и нашел +1 🍬!'); game.candies += 1; game.updateUI(); } },
                'doghouse': { room: 'yard', name: 'Будка', price: 30, emoji: '🛖', top: '55%', left: '75%', action: () => game.customAlert('Будка', 'Гав-гав! 🐶 Охранник на месте, двор в безопасности.') },
                'garden': { room: 'yard', name: 'Грядка', price: 40, emoji: '🌱', top: '68%', left: '20%', action: () => { game.customAlert('Грядка', 'Урожай собран! +3 🍬'); game.candies += 3; game.updateUI(); } },
                'pool': { room: 'yard', name: 'Бассейн', price: 100, emoji: '🏊', top: '62%', left: '50%', action: () => { game.customAlert('Бассейн', 'Плюх! 💦 Питомец освежился!'); const p = document.getElementById('pet'); p.style.transform = 'scale(1.2)'; setTimeout(()=> p.style.transform = '', 300); } },

                // КУХНЯ (kitchen) - исправлены координаты и добавлен уникальный интерактив
                'fridge': { room: 'kitchen', name: 'Холод-к', price: 25, emoji: '🧊', top: '38%', left: '15%', action: () => { if(game.candies>=5){ game.candies-=5; game.clickPower=2; game.updateUI(); game.customAlert('Холодильник', 'Выпит энергетик за 5 🍬! Сила клика x2 на 10 сек!'); setTimeout(()=>{game.clickPower=1;}, 10000); } else { game.customAlert('Холодильник', 'Нужно 5 🍬 для энергетика!'); } } },
                'stove': { room: 'kitchen', name: 'Плита', price: 35, emoji: '♨️', top: '48%', left: '70%', action: () => { game.customAlert('Плита', 'Ты испек блинчики! 🥞 +2 🍬'); game.candies += 2; game.updateUI(); } },
                'bowl': { room: 'kitchen', name: 'Миска', price: 15, emoji: '🥣', top: '75%', left: '25%', action: () => game.customAlert('Миска', 'Ом-ном-ном! 😋 Питомец сыт и счастлив!') }
            },

            petList: ['🤖', '🐱', '🐶', '🐹', '🐰', '🦊', '🦄', '🐲', '👽', '👻'],
            predictions: [
                "Сегодня будет очень няшный день! ✨",
                "Твой код скомпилируется с первого раза! 💻",
                "Пора съесть реальную конфетку! 🍬",
                "Твой проект станет хитом! 🚀",
                "Баги боятся тебя! 🧹"
            ],

            init() {
                if (!this.diary[this.currentDiaryDate]) {
                    this.diary[this.currentDiaryDate] = "";
                }
                this.updateRoomUI();
                this.updateUI();
            },

            // --- СИСТЕМА КОМНАТ: ОБНОВЛЕНО ---
            changeRoom(direction) {
                this.currentRoomIndex += direction;
                if (this.currentRoomIndex < 0) this.currentRoomIndex = 0;
                if (this.currentRoomIndex > 2) this.currentRoomIndex = 2;
                
                this.updateRoomUI();
            },

            updateRoomUI() {
                document.getElementById('room-title').innerText = this.roomNames[this.currentRoomIndex];
                document.getElementById('nav-left').style.display = this.currentRoomIndex === 0 ? 'none' : 'block';
                document.getElementById('nav-right').style.display = this.currentRoomIndex === 2 ? 'none' : 'block';
                
                // Визуальное отличие комнат
                const body = document.body.style;
                const wall = document.querySelector('.wall').style;
                const floor = document.querySelector('.floor').style;
                
                if (this.currentRoomIndex === 0) {
                    // Двор
                    body.background = "#87CEEB"; 
                    wall.background = "#87CEEB"; 
                    floor.background = "#7CFC00"; 
                    floor.borderTop = "4px solid #32CD32";
                    wall.boxShadow = "none";
                } else if (this.currentRoomIndex === 2) {
                    // Кухня
                    body.background = "#FFFACD"; 
                    wall.background = "#FFFACD"; 
                    floor.background = "#F4A460"; 
                    floor.borderTop = "4px solid #D2691E";
                    wall.boxShadow = "none";
                } else {
                    // Спальня - возвращаем выбранную тему
                    this.applyTheme(this.theme);
                }

                this.renderFurniture();
            },

            // --- СИСТЕМА СНА (AFK-РЕЖИМ) ---
            toggleSleep() {
                if (this.isSleeping) {
                    // Пробуждение
                    this.isSleeping = false;
                    clearInterval(this.sleepInterval);
                    document.getElementById('pet').innerText = this.pet;
                    this.customAlert('Пробуждение ☀️', 'Питомец проснулся и готов играть дальше!');
                } else {
                    // Засыпание
                    this.isSleeping = true;
                    document.getElementById('pet').innerText = '💤';
                    this.customAlert('Сон 🛏️', 'Питомец сладко уснул... Zzz... 🌙<br><br><small>Включен AFK-режим. Ты будешь получать +1 🍬 каждую минуту!</small>');
                    
                    this.sleepInterval = setInterval(() => {
                        this.candies += 1;
                        this.updateUI();
                        this.showFloatingText('+1 🍬');
                    }, 60000); // Раз в минуту
                }
            },

            clickPet() {
                if (this.isSleeping) {
                    this.showFloatingText('Zzz...');
                    return; 
                }
                this.candies += this.clickPower;
                this.updateUI();
                this.showFloatingText(`+${this.clickPower} 🍬`);
            },

            updateUI() {
                document.getElementById('candy-count').innerText = this.candies;
                if (!this.isSleeping) {
                    document.getElementById('pet').innerText = this.pet;
                }
                
                localStorage.setItem('nhub_candies', this.candies);
                localStorage.setItem('nhub_pet', this.pet);
                localStorage.setItem('nhub_inv', JSON.stringify(this.inventory));
                localStorage.setItem('nhub_theme', this.theme);
                localStorage.setItem('nhub_diary', JSON.stringify(this.diary));
                localStorage.setItem('nhub_plant', this.plantLevel);
            },

            renderFurniture() {
                const layer = document.getElementById('furniture-layer');
                layer.innerHTML = '';
                
                if (this.plantLevel >= 5 && this.shopItems['plant']) {
                    this.shopItems['plant'].emoji = '🌳';
                    this.shopItems['plant'].name = 'Дерево';
                }

                const currentRoomName = this.rooms[this.currentRoomIndex];

                this.inventory.forEach(id => {
                    const item = this.shopItems[id];
                    if(item && item.room === currentRoomName) {
                        const div = document.createElement('div');
                        div.className = 'placed-item';
                        div.style.top = item.top;
                        div.style.left = item.left;
                        div.innerHTML = `${item.emoji}<span>${item.name}</span>`;
                        div.onclick = (e) => { e.stopPropagation(); item.action(); };
                        layer.appendChild(div);
                    }
                });
            },

            customAlert(title, text) {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerHTML = `
                    <div style="text-align:center; font-size:18px; padding:20px; color:#333; font-weight:bold;">
                        ${text}
                    </div>
                    <button class="card active" style="width:100%; margin-top:10px; border:none;" onclick="game.close()">Понятно 💖</button>
                `;
                document.getElementById('modal').classList.remove('hidden');
            },

            openMiniGame() {
                document.getElementById('modal-title').innerText = "🕹️ Nyash-Catcher";
                document.getElementById('modal-body').innerHTML = `
                    <div style="text-align:center; margin-bottom:10px; font-weight:bold; color:#ff6b8b;">Лови конфетку!</div>
                    <div id="minigame-area" style="position:relative; width:100%; height:200px; background:#fff0f3; border-radius:15px; overflow:hidden; border:2px solid #ff8fa3;">
                        <div id="mg-target" style="position:absolute; top:50%; left:50%; font-size:40px; transform:translate(-50%, -50%); cursor:pointer; transition: 0.2s;" onclick="game.catchCandy()">🍬</div>
                    </div>
                `;
                document.getElementById('modal').classList.remove('hidden');
                
                this.mgInterval = setInterval(() => {
                    const target = document.getElementById('mg-target');
                    if(target) {
                        target.style.top = Math.random() * 80 + 10 + '%';
                        target.style.left = Math.random() * 80 + 10 + '%';
                    } else {
                        clearInterval(this.mgInterval);
                    }
                }, 700);
            },

            catchCandy() {
                this.candies++;
                this.updateUI();
                const target = document.getElementById('mg-target');
                if(target) {
                    target.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    setTimeout(() => { if(target) target.style.transform = 'translate(-50%, -50%) scale(1)'; }, 100);
                }
            },

            openDiary() {
                document.getElementById('modal-title').innerText = "Мой Дневник";
                let dateSelect = `<select onchange="game.changeDiaryDate(this.value)" style="width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:2px solid #ff8fa3; font-weight:bold; outline:none; color:#ff6b8b;">`;
                Object.keys(this.diary).forEach(date => {
                    dateSelect += `<option value="${date}" ${date === this.currentDiaryDate ? 'selected' : ''}>${date}</option>`;
                });
                dateSelect += `</select>`;

                document.getElementById('modal-body').innerHTML = `
                    ${dateSelect}
                    <textarea id="diary-area" style="width:100%; height:150px; border-radius:15px; padding:10px; border:2px solid #ff8fa3; font-family:inherit; resize:none; font-size:16px;">${this.diary[this.currentDiaryDate]}</textarea>
                    <button class="card active" style="width:100%; margin-top:10px; border:none;" onclick="game.saveNotes()">Сохранить 💾</button>
                `;
                document.getElementById('modal').classList.remove('hidden');
            },

            changeDiaryDate(date) {
                this.diary[this.currentDiaryDate] = document.getElementById('diary-area').value;
                this.currentDiaryDate = date;
                this.openDiary();
            },

            saveNotes() {
                this.diary[this.currentDiaryDate] = document.getElementById('diary-area').value;
                this.updateUI();
                this.close();
                this.showFloatingText('Сохранено! 📝');
            },

            waterPlant() {
                if (this.plantLevel >= 5) {
                    this.customAlert("🪴 Цветок", "🌳 Дерево уже выросло до максимума!");
                    return;
                }
                if (this.candies < 2) {
                    this.customAlert("🪴 Цветок", "💧 Нужно 2 🍬 для полива!");
                    return;
                }
                this.candies -= 2;
                this.plantLevel++;
                this.updateUI();
                this.renderFurniture();
                this.showFloatingText(`Уровень ${this.plantLevel}/5 💧`);
            },

            startParty() {
                if (this.partyActive) {
                    this.customAlert("🎉 Party!", "Вечеринка уже идёт! Кликай быстрее!");
                    return;
                }
                
                this.partyActive = true;
                this.clickPower = 3;
                this.close();
                this.showFloatingText('CANDY PARTY! x3 🍬');

                const body = document.body.style;
                const wall = document.querySelector('.wall').style;
                const floor = document.querySelector('.floor').style;
                const colors = ['#ff007f', '#00ff00', '#00d4ff', '#ffea00', '#9d00ff', '#ff3300'];

                let partyInterval = setInterval(() => {
                    let randomColor = colors[Math.floor(Math.random() * colors.length)];
                    body.background = randomColor; wall.background = randomColor; floor.background = randomColor;

                    let randomDegree = Math.floor(Math.random() * 360);
                    document.querySelectorAll('.placed-item').forEach(item => {
                        item.style.filter = `drop-shadow(0 5px 10px rgba(0,0,0,0.1)) hue-rotate(${randomDegree}deg)`;
                    });
                    document.getElementById('pet').style.filter = `drop-shadow(0 10px 10px rgba(0,0,0,0.1)) hue-rotate(${randomDegree}deg)`;
                }, 300);

                setTimeout(() => {
                    clearInterval(partyInterval);
                    this.partyActive = false;
                    this.clickPower = 1;
                    
                    // Возвращаем цвета в зависимости от комнаты
                    this.updateRoomUI(); 
                    
                    document.querySelectorAll('.placed-item').forEach(item => {
                        item.style.filter = `drop-shadow(0 5px 10px rgba(0,0,0,0.1))`;
                    });
                    document.getElementById('pet').style.filter = `drop-shadow(0 10px 10px rgba(0,0,0,0.1))`;

                    this.customAlert("🎉 Party!", "Candy Party окончена! Остываем... 😮‍💨");
                }, 10000);
            },

            openSettings() {
                document.getElementById('modal-title').innerText = "Гардероб (Темы)";
                document.getElementById('modal-body').innerHTML = `
                    <div class="grid">
                        <div class="card" onclick="game.applyTheme('theme-pink')" style="background:#ffeaef; border-color:#ff8fa3;">Розовый 🌸</div>
                        <div class="card" onclick="game.applyTheme('theme-dark')" style="background:#0b0f19; color:white; border-color:#334155;">Ночь 🌙</div>
                        <div class="card" onclick="game.applyTheme('theme-neon')" style="background:#000; color:#39ff14; border-color:#39ff14;">Неон ⚡</div>
                        <div class="card" onclick="game.applyTheme('theme-ocean')" style="background:#e0f7fa; color:#006064; border-color:#26c6da;">Океан 🌊</div>
                        <div class="card" onclick="game.applyTheme('theme-forest')" style="background:#e8f5e9; color:#1b5e20; border-color:#66bb6a;">Лес 🌲</div>
                        <div class="card" onclick="game.applyTheme('theme-sunset')" style="background:#fff3e0; color:#e65100; border-color:#ffb74d;">Закат 🌅</div>
                    </div>
                `;
                document.getElementById('modal').classList.remove('hidden');
            },

            applyTheme(t) {
                this.theme = t;
                const body = document.body.style; const wall = document.querySelector('.wall').style; const floor = document.querySelector('.floor').style;
                wall.boxShadow = "none";
                
                // Тема применяется только если мы в спальне (индекс 1)
                if (this.currentRoomIndex === 1) {
                    if(t === 'theme-pink') {
                        body.background = "#ffeaef"; wall.background = "#ffc2d1"; floor.background = "#fb6f92";
                        floor.borderTop = "4px solid rgba(0,0,0,0.05)";
                    } else if(t === 'theme-dark') {
                        body.background = "#0b0f19"; wall.background = "#141b2d"; floor.background = "#1f2940";
                        floor.borderTop = "4px solid #0b0f19";
                    } else if(t === 'theme-neon') {
                        body.background = "#000000"; wall.background = "#050505"; floor.background = "#0a0a0a";
                        floor.borderTop = "4px solid #39ff14";
                        wall.boxShadow = "inset 0 -15px 30px rgba(57, 255, 20, 0.15)";
                    } else if(t === 'theme-ocean') {
                        body.background = "#e0f7fa"; wall.background = "#b2ebf2"; floor.background = "#4dd0e1";
                        floor.borderTop = "4px solid rgba(0,0,0,0.05)";
                    } else if(t === 'theme-forest') {
                        body.background = "#e8f5e9"; wall.background = "#c8e6c9"; floor.background = "#81c784";
                        floor.borderTop = "4px solid rgba(0,0,0,0.05)";
                    } else if(t === 'theme-sunset') {
                        body.background = "#fff3e0"; wall.background = "#ffe0b2"; floor.background = "#ffb74d";
                        floor.borderTop = "4px solid rgba(0,0,0,0.05)";
                    }
                }
                this.updateUI();
            },

            askOracle() {
                const phrase = this.predictions[Math.floor(Math.random() * this.predictions.length)];
                this.customAlert("🔮 Оракул шепчет:", phrase);
            },

            showFloatingText(txt) {
                const el = document.createElement('div');
                el.innerText = txt;
                el.style.position = 'absolute';
                el.style.left = '50%';
                el.style.bottom = '30%';
                el.style.color = 'white';
                el.style.textShadow = '0px 2px 4px rgba(0,0,0,0.5)';
                el.style.fontWeight = 'bold';
                el.style.fontSize = '24px';
                el.style.transition = '1s';
                el.style.zIndex = '100';
                el.style.pointerEvents = 'none';
                el.style.transform = 'translateX(-50%)';
                document.body.appendChild(el);
                setTimeout(() => {
                    el.style.transform = 'translate(-50%, -50px)';
                    el.style.opacity = '0';
                }, 10);
                setTimeout(() => el.remove(), 1000);
            },

            buy(id) {
                const item = this.shopItems[id];
                if (this.candies >= item.price && !this.inventory.includes(id)) {
                    this.candies -= item.price;
                    this.inventory.push(id);
                    this.updateUI();
                    this.renderFurniture();
                    this.openShop();
                }
            },

            openShop() {
                document.getElementById('modal-title').innerText = `Магазин (${this.roomNames[this.currentRoomIndex]})`;
                let html = '<div class="grid">';
                
                const currentRoomName = this.rooms[this.currentRoomIndex];
                let hasItems = false;

                for (let id in this.shopItems) {
                    const item = this.shopItems[id];
                    if (item.room === currentRoomName) {
                        hasItems = true;
                        const isOwned = this.inventory.includes(id);
                        html += `
                            <div class="card ${isOwned ? 'active' : ''}" onclick="game.buy('${id}')">
                                <div style="font-size:40px">${item.emoji}</div>
                                <b style="color:#ff6b8b">${item.name}</b><br>
                                <small>${isOwned ? 'Куплено' : item.price + ' 🍬'}</small>
                            </div>
                        `;
                    }
                }
                
                if (!hasItems) html += `<div style="grid-column: span 2; text-align:center;">Здесь пока нечего купить!</div>`;
                html += '</div>';
                
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal').classList.remove('hidden');
            },

            openPets() {
                document.getElementById('modal-title').innerText = "Питомцы";
                let html = '<div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 8px;">';
                this.petList.forEach(p => {
                    html += `<div class="card ${this.pet === p ? 'active' : ''}" onclick="game.setPet('${p}')" style="font-size:35px; padding:10px;">${p}</div>`;
                });
                html += '</div>';
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal').classList.remove('hidden');
            },

            setPet(emoji) { 
                this.pet = emoji; 
                if (!this.isSleeping) document.getElementById('pet').innerText = emoji; 
                this.updateUI(); 
                this.close(); 
            },
            
            close() { 
                document.getElementById('modal').classList.add('hidden'); 
                if(this.mgInterval) clearInterval(this.mgInterval); 
            },
            
            closeBg(e) { if (e.target.id === 'modal') this.close(); }
        };

        window.addEventListener('DOMContentLoaded', () => {
            game.init();
            
            // ЗАПУСК PWA (Service Worker)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Registered', reg))
                    .catch(err => console.log('PWA Failed', err));
            }
        });
    </script>
</body>
</html>
