<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub v2.0 | Изометрическая Вселенная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=JetBrains+Mono:wght@500&family=Pacifico&family=Inter:wght@400;900&family=Kelly+Slab&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cherry-blossom font-main">

    <div id="app-root">
        <div class="room-container">
            <div class="walls">
                <div class="wall left-wall"></div>
                <div class="wall right-wall"></div>
            </div>
            <div class="floor-area"></div>
            
            <div id="room-canvas"></div>

            <div class="pet-anchor" onclick="PetEngine.tap(event)">
                <div id="pet-speech" class="bubble hidden">Ня! ✨</div>
                <div class="pet-sprite">🤖</div>
                <div class="pet-shadow"></div>
            </div>
        </div>

        <div class="hud-layer">
            <div class="balance-card glass-ui" onclick="UIMachine.open('shop')">
                <span class="candy-icon">🍬</span>
                <span id="candy-val">0</span>
            </div>
            <div class="action-buttons">
                <button class="circle-btn glass-ui" onclick="UIMachine.open('settings')"><i class="fas fa-palette"></i></button>
                <button class="circle-btn glass-ui" onclick="UIMachine.open('inventory')"><i class="fas fa-box-open"></i></button>
            </div>
        </div>

        <div id="modal-overlay" class="modal-system hidden" onclick="UIMachine.closeOnOut(event)">
            <div class="modal-window glass-heavy">
                <div class="modal-header">
                    <h2 id="modal-title">Заголовок</h2>
                    <button class="close-x" onclick="UIMachine.close()">×</button>
                </div>
                <div id="modal-body" class="modal-scroll-area"></div>
            </div>
        </div>

        <div id="toast-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
