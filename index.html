<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub 3.0 | My Evolution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=JetBrains+Mono:wght@500&family=Pacifico&family=Inter:wght@400;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cherry-blossom font-main">

    <div id="world">
        <div class="room-stage">
            <div class="wall-l"></div>
            <div class="wall-r"></div>
            <div class="floor-base"></div>
            
            <div id="furniture-layer"></div>

            <div class="pet-zone" onclick="Game.tapPet(event)">
                <div id="tap-msg" class="pop-up hidden">+1 🍬</div>
                <div id="pet-avatar" class="pet-main-sprite">🤖</div>
                <div class="shadow-oval"></div>
            </div>
        </div>

        <div class="hud">
            <div class="stat-pill glass" onclick="UI.open('shop')">
                <span class="candy-ico">🍬</span> <span id="balance">0</span>
            </div>
            <div class="side-menu">
                <button class="btn-round glass" onclick="UI.open('pet-select')"><i class="fas fa-paw"></i></button>
                <button class="btn-round glass" onclick="UI.open('settings')"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div id="modal-screen" class="modal-overlay hidden" onclick="UI.closeOnBg(event)">
            <div class="modal-window glass-card">
                <div class="modal-head">
                    <h2 id="modal-title">Няш-Меню</h2>
                    <button class="x-btn" onclick="UI.close()">×</button>
                </div>
                <div id="modal-body" class="modal-content"></div>
            </div>
        </div>

        <div id="notif-box"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
