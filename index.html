<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub | Ultimate Edition</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: #ffeaef; transition: 0.5s; }

        #app { position: fixed; inset: 0; }

        /* КОМНАТА */
        .room-bg { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .wall { width: 100%; height: 60%; background: var(--wall-clr, #ffc2d1); transition: 0.5s; }
        .floor { width: 100%; height: 40%; background: var(--floor-clr, #fb6f92); border-top: 5px solid rgba(0,0,0,0.05); transition: 0.5s; }

        /* ИНТЕРФЕЙС */
        #hud { position: absolute; top: 30px; left: 20px; right: 20px; z-index: 100; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .ui-el { pointer-events: auto; background: white; border: none; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .badge { padding: 12px 20px; font-weight: bold; font-size: 20px; color: #ff6b8b; }
        .btn-group { display: flex; gap: 10px; }
        .btn { width: 55px; height: 55px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }

        /* ПИТОМЕЦ */
        #pet-zone { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 50; cursor: pointer; text-align: center; }
        #pet { font-size: 130px; transition: 0.2s; animation: float 3s infinite ease-in-out; }
        .sleeping #pet { filter: grayscale(0.5); animation: sleep 2s infinite; }

        /* МЕБЕЛЬ */
        #furniture-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        .item { position: absolute; pointer-events: auto; cursor: pointer; text-align: center; font-size: 60px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); transition: 0.3s; }
        .item:hover { transform: scale(1.1); }
        .item span { display: block; font-size: 10px; background: rgba(255,143,163,0.9); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-top: -5px; }

        /* МОДАЛКИ */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 35px; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #f8f9fa; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 3px solid transparent; }
        .card.active { border-color: #ff8fa3; background: #fff0f3; }

        /* МИНИ-ИГРА */
        #game-canvas { width: 100%; height: 200px; background: #eee; border-radius: 20px; display: block; margin-top: 10px; position: relative; overflow: hidden; }
        .game-obj { position: absolute; font-size: 30px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes sleep { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        @keyframes party { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .party-mode { animation: party 1s infinite linear; }
    </style>
</head>
<body>

    <div id="app">
        <div class="room-bg">
            <div class="wall"></div>
            <div class="floor"></div>
        </div>

        <div id="furniture-layer"></div>

        <div id="pet-zone" onclick="game.clickPet()">
            <div id="pet">🤖</div>
        </div>

        <div id="hud">
            <div class="ui-el badge">🍬 <span id="candy-count">0</span></div>
            <div class="btn-group">
                <button class="ui-el btn" onclick="game.openShop()">🛒</button>
                <button class="ui-el btn" onclick="game.openPets()">🐾</button>
            </div>
        </div>

        <div id="modal" onclick="game.closeBg(event)">
            <div class="modal-content">
                <h2 id="modal-title" style="margin-bottom:15px; color:#ff6b8b">Меню</h2>
                <div id="modal-body"></div>
                <button onclick="game.close()" style="margin-top:20px; width:100%; padding:12px; border:none; border-radius:15px; background:#eee; font-weight:bold; cursor:pointer;">Закрыть</button>
            </div>
        </div>
    </div>

<script>
    const game = {
        candies: parseInt(localStorage.getItem('nh_candies')) || 0,
        pet: localStorage.getItem('nh_pet') || '🤖',
        inventory: JSON.parse(localStorage.getItem('nh_inv')) || [],
        theme: localStorage.getItem('nh_theme') || 'pink',
        notes: localStorage.getItem('nh_notes') || '',
        flowerStage: parseInt(localStorage.getItem('nh_flower')) || 0,
        
        isSleeping: false,
        isParty: false,
        multiplier: 1,

        db: {
            'wardrobe': { name: 'Шкаф', price: 10, emoji: '👗', top: '20%', left: '10%', action: () => game.uiWardrobe() },
            'diary': { name: 'Дневник', price: 20, emoji: '📔', top: '65%', left: '15%', action: () => game.uiDiary() },
            'oracle': { name: 'Оракул', price: 40, emoji: '🔮', top: '25%', left: '75%', action: () => game.uiOracle() },
            'pc': { name: 'Компьютер', price: 50, emoji: '🖥️', top: '50%', left: '70%', action: () => game.uiPC() },
            'bed': { name: 'Кровать', price: 30, emoji: '🛏️', top: '55%', left: '10%', action: () => game.toggleSleep() },
            'lamp': { name: 'Лампа', price: 15, emoji: '💡', top: '45%', left: '25%', action: () => game.toggleParty() },
            'plant': { name: 'Цветок', price: 5, emoji: '🪴', top: '65%', left: '80%', action: () => game.waterFlower() }
        },

        init() {
            this.updateUI();
            this.renderRoom();
            this.setTheme(this.theme);
            setInterval(() => this.afkIncome(), 10000); // Доход в кровати каждые 10 сек
        },

        clickPet() {
            if (this.isSleeping) return;
            const gain = 1 * this.multiplier;
            this.candies += gain;
            this.updateUI();
            this.popText(`+${gain} 🍬`);
        },

        updateUI() {
            document.getElementById('candy-count').innerText = this.candies;
            document.getElementById('pet').innerText = this.isSleeping ? '💤' : this.pet;
            localStorage.setItem('nh_candies', this.candies);
            localStorage.setItem('nh_pet', this.pet);
            localStorage.setItem('nh_inv', JSON.stringify(this.inventory));
            localStorage.setItem('nh_theme', this.theme);
            localStorage.setItem('nh_notes', this.notes);
            localStorage.setItem('nh_flower', this.flowerStage);
        },

        renderRoom() {
            const layer = document.getElementById('furniture-layer');
            layer.innerHTML = '';
            this.inventory.forEach(id => {
                const it = this.db[id];
                const div = document.createElement('div');
                div.className = 'item';
                div.style.top = it.top; div.style.left = it.left;
                let displayEmoji = it.emoji;
                if(id === 'plant') {
                    const stages = ['🌱', '🪴', '🌿', '🌸', '🌳'];
                    displayEmoji = stages[this.flowerStage] || '🌳';
                }
                div.innerHTML = `${displayEmoji}<span>${it.name}</span>`;
                div.onclick = (e) => { e.stopPropagation(); it.action(); };
                layer.appendChild(div);
            });
        },

        // --- ЛОГИКА ПРЕДМЕТОВ ---

        toggleSleep() {
            this.isSleeping = !this.isSleeping;
            document.getElementById('pet-zone').classList.toggle('sleeping');
            this.updateUI();
            alert(this.isSleeping ? "Питомец лег отдыхать. Теперь конфеты капают сами, но тапать нельзя!" : "Питомец проснулся!");
        },

        afkIncome() {
            if (this.isSleeping) {
                this.candies += 1;
                this.updateUI();
                this.popText('+1 🍬', true);
            }
        },

        toggleParty() {
            this.isParty = !this.isParty;
            this.multiplier = this.isParty ? 2 : 1;
            document.body.classList.toggle('party-mode');
            alert(this.isParty ? "CANDY PARTY! Клики дают x2 конфет! ✨" : "Вечеринка окончена.");
        },

        waterFlower() {
            if (this.flowerStage < 4) {
                this.flowerStage++;
                this.updateUI();
                this.renderRoom();
                this.popText('Растет! ✨');
            } else {
                this.candies += 50;
                this.flowerStage = 0;
                this.updateUI();
                this.renderRoom();
                alert("Ты вырастил дерево! Собрано 50 конфет! 🍬");
            }
        },

        uiWardrobe() {
            this.showModal("Гардероб", `<div class="grid">
                <div class="card" onclick="game.setTheme('pink')">Розовый</div>
                <div class="card" onclick="game.setTheme('dark')">Тёмный</div>
                <div class="card" onclick="game.setTheme('neon')">Неон</div>
            </div>`);
        },

        setTheme(t) {
            this.theme = t;
            const s = document.documentElement.style;
            if(t === 'pink') { s.setProperty('--wall-clr', '#ffc2d1'); s.setProperty('--floor-clr', '#fb6f92'); document.body.style.background = "#ffeaef"; }
            if(t === 'dark') { s.setProperty('--wall-clr', '#1e293b'); s.setProperty('--floor-clr', '#0f172a'); document.body.style.background = "#020617"; }
            if(t === 'neon') { s.setProperty('--wall-clr', '#1a1a1a'); s.setProperty('--floor-clr', '#000'); document.body.style.background = "#000"; }
            this.updateUI(); this.close();
        },

        uiDiary() {
            this.showModal("Дневник", `
                <textarea id="d-area" style="width:100%; height:150px; border-radius:15px; padding:10px; border:2px solid #ff8fa3;">${this.notes}</textarea>
                <button onclick="game.notes=document.getElementById('d-area').value; game.updateUI(); game.close();" style="width:100%; margin-top:10px; padding:10px; border-radius:10px; border:none; background:#ff8fa3; color:white; font-weight:bold;">Сохранить</button>
            `);
        },

        uiOracle() {
            const p = ["Будет много конфет!", "Твой питомец тебя любит!", "Сегодня удачный день для кода!", "Няшность зашкаливает!", "Ожидай сюрприз!"];
            alert("🔮 Оракул говорит: " + p[Math.floor(Math.random()*p.length)]);
        },

        uiPC() {
            this.showModal("Nyash-Game", `
                <div style="text-align:center; margin-bottom:10px;">Лови конфеты! Собирай очки!</div>
                <div id="game-canvas" onclick="game.gameJump()"></div>
                <div id="game-score" style="font-weight:bold; margin-top:10px;">Счет: 0</div>
            `);
            this.startMiniGame();
        },

        // --- МИНИ-ИГРА ---
        startMiniGame() {
            const canvas = document.getElementById('game-canvas');
            let score = 0;
            const loop = setInterval(() => {
                if(!document.getElementById('game-canvas')) { clearInterval(loop); return; }
                const candy = document.createElement('div');
                candy.className = 'game-obj';
                candy.innerText = '🍬';
                candy.style.left = Math.random() * 90 + '%';
                candy.style.top = '-40px';
                candy.style.transition = '2s linear';
                canvas.appendChild(candy);
                
                setTimeout(() => { candy.style.top = '220px'; }, 10);
                candy.onclick = (e) => {
                    e.stopPropagation();
                    score++;
                    this.candies++;
                    document.getElementById('game-score').innerText = 'Счет: ' + score;
                    this.updateUI();
                    candy.remove();
                };
                setTimeout(() => candy.remove(), 2000);
            }, 800);
        },

        // --- СИСТЕМНЫЕ ---
        showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal').style.display = 'flex';
        },

        openShop() {
            let h = '<div class="grid">';
            for(let id in this.db) {
                const owned = this.inventory.includes(id);
                h += `<div class="card ${owned?'active':''}" onclick="game.buy('${id}')">
                    <div style="font-size:40px">${this.db[id].emoji}</div>
                    <b>${this.db[id].name}</b><br><small>${owned?'В комнате':this.db[id].price+' 🍬'}</small>
                </div>`;
            }
            this.showModal("Магазин", h + '</div>');
        },

        openPets() {
            const list = ['🤖','🐱','🐶','🐹','🐰','🦊','🦄','🐲','👽','👻'];
            let h = '<div class="grid" style="grid-template-columns:repeat(4,1fr)">';
            list.forEach(p => {
                h += `<div class="card ${this.pet===p?'active':''}" onclick="game.pet='${p}';game.updateUI();game.close()" style="font-size:30px">${p}</div>`;
            });
            this.showModal("Питомцы", h + '</div>');
        },

        buy(id) {
            if(this.candies >= this.db[id].price && !this.inventory.includes(id)) {
                this.candies -= this.db[id].price;
                this.inventory.push(id);
                this.updateUI(); this.renderRoom(); this.openShop();
            }
        },

        popText(t, isAuto=false) {
            const el = document.createElement('div');
            el.innerText = t;
            el.style.cssText = `position:fixed; left:50%; bottom:30%; color:#ff6b8b; font-weight:bold; transition:1s; pointer-events:none; z-index:200;`;
            if(isAuto) el.style.left = '40%';
            document.body.appendChild(el);
            setTimeout(() => { el.style.transform = 'translateY(-100px)'; el.style.opacity = '0'; }, 20);
            setTimeout(() => el.remove(), 1000);
        },

        close() { document.getElementById('modal').style.display = 'none'; },
        closeBg(e) { if(e.target.id === 'modal') this.close(); }
    };

    window.onload = () => game.init();
</script>
</body>
</html>
