<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashHub Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-pink font-main">

    <div class="hud">
        <div class="candy-stats" onclick="UI.open('shop')">
            🍬 <span id="count">0</span>
        </div>
        <div class="hud-btns">
            <button class="circle-btn" onclick="UI.open('pets')"><i class="fas fa-paw"></i></button>
            <button class="circle-btn" onclick="UI.open('settings')"><i class="fas fa-magic"></i></button>
        </div>
    </div>

    <main id="room">
        <div class="room-background">
            <div class="wall"></div>
            <div class="floor"></div>
        </div>

        <div id="furniture"></div>

        <div class="pet-wrapper" onclick="App.clickPet()">
            <div id="pet-emoji">🤖</div>
            <div class="shadow"></div>
        </div>
    </main>

    <div id="modal" class="modal-overlay hidden" onclick="UI.closeBg(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="m-title">Меню</h2>
                <button onclick="UI.close()" class="close-btn">&times;</button>
            </div>
            <div id="m-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
